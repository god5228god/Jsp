<script type="text/javascript">
	function actionChoice(){
		let radioObj = document.getElementsByName("size");
		
		// 확인
		// alert(radioObj);
		//--==>> [object NodeList] → 자바스크립트 배열
		// alert(radioObj.length);
		//---==>> 6 
		
		// 확인
		//alert(radioObj[0].checked);

		//alert(radioObj[3].checked);

//		let msg = "";
		let msg = "선택된 항목이 존재하지 않습니다.";
		
		for(let i=0; i<radioObj.length; i++)

			// 확인

			}

	<form>
		--- 사이즈 선택 --- <br><br>
		
		<!-- name 속성 check -->
		<input type="radio" name="size" id="a" value="1" />
		<label for="a">싱글(1)</label>

		<input type="radio" name="size" id="f" value="6" />
		<label for="f">하프갤런(6)</label>
		<br><br>
		
		<button type="button" class="btn" onclick="actionChoice()">확인</button>
	</form>
