<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Test015.html</title>
		<style>
/* 			*
			{
				font-size: 20px;
				font-weight: bold;
				font-family: "맑은 고딕";
				color: #334433;
			} */
		</style>
	</head>
	<body>
		<div>
			<h1>드롭다운메뉴(selectbox)만들기</h1>
			<br>
		</div>
	
		<form>
			<p>당신이 가장 좋아하는 스포츠는?</p>
			<select name="selectSport">
				<option value="val1">야구</option> 
				<option value="val2">축구</option> 
				<option value="val3">배구</option> 
				<option value="val4">농구</option> 
				<option value="val5">탁구</option> 
			</select>
			<br><br>
			
			<p>당신의 직책은?</p>
			<select name="selectPosition">
				<option value="1">회장</option>
				<option value="2">사장</option>
				<option value="3">부장</option>
				<option value="4">과장</option>
				<option value="5">대리</option>
				<option value="6" selected="selected">사원</option>
			</select>
			<br><br>
			
			<p>가고 싶은 여행지는?(다중 선택 가능)</p>
			<select name="trav" multiple="multiple" size="6">
				<option value="val1">백두산</option>
				<option value="val2">한라산</option>
				<option value="val3">지리산</option>
				<option value="val4">설악산</option>
				<option value="val5">속리산</option>
				<option value="val6">북한산</option>
			</select>
			<br><br>
			
			
			<p>가고 싶은 여행지는?</p>
			<select name="trav2">
				<optgroup label="mount">
					<option value="val1">백두산</option>
					<option value="val2">한라산</option>
					<option value="val3">지리산</option>
				</optgroup>
				<optgroup label="island">
				<option value="val4">제주도</option>
				<option value="val5">울릉도</option>
				<option value="val6">독도</option>
				</optgroup>
			</select>
			<br><br>
			
			<button type="button">서버로 전송</button>
			<button type="reset">취소</button>
		</form>		
		
	</body>
</html>
