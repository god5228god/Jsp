<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test006.html</title>
<script type="text/javascript">

	num1 = 7;
	num2 = 3;
	
	res = num1 + num2;						//-- 더하기(덧셈 연산)
	document.write("num1 + num2 = ");	
	document.write(res);
	
	res = num1 - num2;						//-- 빼기(뺄셈 연산)					
	document.write("<br>num1 - num2 = ");	
	document.write(res);
	
	res = num1 * num2;						//-- 곱하기(곱셈 연산)	
	document.write("<br>num1 * num2 = ");	
	document.write(res);
	
	res = num1 / num2;						//-- 나누기(나눗셈 연산)
	document.write("<br>num1 / num2 = ");	//-- 결과값으로 반환되는 데이터 형태 관찰
	document.write(res);
	
	res = num1 % num2;						//-- 나머지(나눗셈 연산)	
	document.write("<br>num1 % num2 = ");	
	document.write(res);
	
	document.write("<br>--------------------------<br>");
	document.write("<br>원래의 num1 : ");
	document.write(num1);
	
	++num1;
	document.write("<br>첫 번째 ++num1 : ");
	document.write(num1);
	
	++num1;
	document.write("<br>두 번째 ++num1 : ");
	document.write(num1);
	
	document.write("<br><br>원래의 num2 : ");
	document.write(num2);
	
	--num2;
	document.write("<br>첫 번째 --num2 : ");
	document.write(num2);
	
	--num2;
	document.write("<br>두 번째 --num2 : ");
	document.write(num2);
	
	
	document.write("<br>--------------------------<br>");
	
	num1 = 7;
	num2 = 3;
	
	num1 += num2;
	document.write("<br>num1 += num2 → num1 : ");
	document.write(num1);
	
	
	num1 = 7;
	num2 = 3;
	
	num1 -= num2;
	document.write("<br>num1 -= num2 → num1 : ");
	document.write(num1);
	
	num1 = 7;
	num2 = 3;
	
	num1 *= num2;
	document.write("<br>num1 *= num2 → num1 : ");
	document.write(num1);
	
	num1 = 7;
	num2 = 3;
	
	num1 /= num2;
	document.write("<br>num1 /= num2 → num1 : ");
	document.write(num1);
	
	num1 = 7;
	num2 = 3;
	
	num1 %= num2;
	document.write("<br>num1 %= num2 → num1 : ");
	document.write(num1);
	
	document.write("<br>--------------------------<br>");
	
	num1 = 7;
	num2 - 3;
	
	res = (num1 == num2);
	document.write("<br>num1 == num2 → ");
	document.write(res);
	
	res = (num1 >= num2);
	document.write("<br>num1 >= num2 → ");
	document.write(res);
	
	res = (num1 <= num2);
	document.write("<br>num1 <= num2 → ");
	document.write(res);
	
	document.write("<br><br>");
	
	res = (num1 < 10 && num2 < 10);
	document.write("<br>num1 < 10 && num2 < 10 → ");
	document.write(res);

	
	res = (num1 > 10 && num2 > 10);
	document.write("<br>num1 > 10 && num2 > 10 → ");
	document.write(res);
	
	res = (num1 > 10 || num2 > 10);
	document.write("<br>num1 > 10 || num2 > 10 → ");
	document.write(res);
	
	res = (num1 < 10 || num2 < 10);
	document.write("<br>num1 < 10 || num2 < 10 → ");
	document.write(res);
	
	res = !(num1==num2);
	document.write("<br> !(num1==num2) → ");
	document.write(res);
	
	
	document.write("<br>--------------------------<br>");
	
	human = "연인";
	
	res = (human == "연인")? "사랑":"우정";
	document.write("<br> res = ");
	document.write(res);
	
	human = "친구";
	
	res = (human == "연인")? "사랑":"우정";
	document.write("<br> res = ");
	document.write(res);
	
	
	
	
	
	
</script>
</head>
