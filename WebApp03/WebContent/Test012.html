<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test012.html</title>
<style type="text/css">
form{width: 200px; background-color: #f0f0f0; padding: 15px;}
.txtBox{width: 80px; height: 25px; background-color: #ddd; border:none; margin: 0 5px; text-align: right; padding-right: 5px; box-sizing: border-box;}
.tBox1{background-color: #fff;}
.btnWrap{height: 50px; text-align: center; line-height: 50px; margin-top: 25px;}
.btn{width: 60px; height: 35px; background-color: #9ebaff; color: #fff; border: none; border-radius: 2px; font-weight: bold; }
.wrap{width: 170px; }
.btn2{background-color: #e8c735}
.tBoxWrap{display:  inline-block; text-align:right; width: 170px; height: 50px; line-height: 50px; padding-top: 5px;}
</style>
<script type="text/javascript">

function calc()
{
	var money= parseInt(document.getElementById("money").value);
	
	document.getElementById("totalMoney").value = money;
	var m500 = money/500;
	// var m500 = parseInt(money/500); 정수 변환도 가능
	document.getElementById("m500").value = Math.floor(m500) * 500;
	var m100 = (money%500)/100;
	document.getElementById("m100").value = Math.floor(m100) * 100;
	var m50 = (money%100)/50;
	document.getElementById("m50").value = Math.floor(m50) * 50;;
	var m10 = (money%50)/10;
	document.getElementById("m10").value = Math.floor(m10) * 10;; 
}

</script>
</head>
<body>
<div>
	<h1>자바스크립트 활용</h1>
	<hr />
</div>
<!-- 
	특정 금액(10원 ~ 990원)을 사용자로부터 입력받아
	화폐 단위로 구분하여 출력하는 페이지를 구성한다.
	화폐 단위는 편의상 오백원, 백원, 오십원, 십원으로 구분한다.
	HTML, CSS, JS를 활용한다.
	
	페이지 기본 레이아웃 구성
	-------------------------------------
	금액 [ 		]원		#money
	
	< 결과 > < 취소 >
	
	  총액 [      ]원	#totalMoney
	오백원 [      ]원	#m500
	  백원 [      ]원	#m100
	오십원 [      ]원	#m50
	  십원 [      ]원	#m10
	  
	-------------------------------------
	
 -->
 
 <div>
 	<form >
 		<div class="wrap">
 			<div class="tBoxWrap">금액 <input type="text" class="txtBox tBox1"  id="money"/>원</div>
 		</div>
 		
 		<div class="btnWrap">
 			<input type="button" class="btn" id="result" value="결과" onclick="calc()" />
 			<input type="reset" class="btn btn2" value="취소" />
 		</div>
 		
 		<br>
 		<div class="wrap">
 			<div class="tBoxWrap">
	 			총액 <input type="text" class="txtBox" id="totalMoney" disabled="disabled" />원
	 		</div>
	 		<div class="tBoxWrap">
	 			오백원 <input type="text" class="txtBox"  id="m500" disabled="disabled" />원
	 		</div>
	 		<div class="tBoxWrap">
	 			백원 <input type="text" class="txtBox"  id="m100" disabled="disabled" />원
	 		</div>
	 		<div class="tBoxWrap">
	 			오십원 <input type="text" class="txtBox"  id="m50" disabled="disabled" />원
	 		</div>
	 		<div class="tBoxWrap">
				십원 <input type="text" class="txtBox"  id="m10" disabled="disabled" />원
	 		</div>
 		</div>
 		
 		
 		
 	</form>
 
 </div>	
</body>
</html>
