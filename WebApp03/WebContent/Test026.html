<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test026.html</title>
<style type="text/css">
.btn{margin: 20px 0;width: 100px; height: 40px; font-size: 18px; border: none;  background-color: black; color: #fff; font-weight: bold;}
.btn:hover{background-color: #fff; color: black; border: 3px solid black;}

</style>
<script type="text/javascript">
	function actionChoice()
	{
		// alert("함수호출확인");
		let checkObj = document.getElementsByName("subject");
		let msg = "";
		//let msg = "선택 항목이 존재하지 않습니다."; -- 안됨
		let flag = true;
		
		for(let i = 0 ; i< checkObj.length;  i++){
			// 확인
			//alert(checkObj[i].checked);
			
			if(checkObj[i].checked){
				msg += checkObj[i].value+ " ";
				flag = false;
			}
		}
		
		//alert(msg);
		
		if(flag){
			msg = "선택 항목이 존재하지 않습니다.";
			alert(msg);
		}else{
			alert(msg);
		}
		
		
	}
</script>
</head>
<body>
<div>
	<h1>자바스크립트 활용</h1>
	<hr />
</div>

<div>
	<h2>라디오버튼, 체크박스 다루기</h2>
	<form>
	 	--- 과목 선택 ---<br><br>
	 	<!-- name 속성 공유 check -->
	 	<input type="checkbox" name="subject" id="a" value="자바기초" />
	 	<label for="a">JAVA Beginning</label><br>
	 	<input type="checkbox" name="subject" id="b" value="오라클" />
	 	<label for="b">Oracle</label><br>
	 	<input type="checkbox" name="subject" id="c" value="자바심화" />
	 	<label for="c">JAVA Advanced</label><br>
	 	<input type="checkbox" name="subject" id="d" value="웹클라이언트" />
	 	<label for="d">Web Client</label><br>
	 	<input type="checkbox" name="subject" id="e" value="웹APP서버" />
	 	<label for="e">JSP/Servlet</label><br>
	 	<input type="checkbox" name="subject" id="f" value="프레임워크" />
	 	<label for="f">Framework</label>
	 	<br><br>
	 	
	 	<button type="button" class="btn" onclick="actionChoice()">선택 완료</button>
	 	<br /><br />
	</form>
</div>
</body>
</html>
