	// 비즈니스 로직 분리 → 로또 1게임 실행
	function runLottoSingle()
	{
			
		// 방이 6개로 구성된 자바스크립트 배열 생성
		let lottoArray = new Array(6);
		
		// 공 45개로 구성된 자바스크립트 배열 생성
		let arr = new Array(45);
		
		// 1 ~ 45까지의 로또 번호를 공에 채우기
		for(let i=1; i<=arr.length; i++) // i: 1 ~ 45
			arr[i-1] = i;				  //arr[0]=1; arr[1]=2; ... arr[44] = 45;
			
		// 확인
		//alert(arr[9]);
		
		// 뒤섞기
		for(let i=0; i<arr.length; i++) // i: 0 ~ 44
		{
			let j = parseInt(Math.random()*45); // 0 ~ 44 까지의 정수 형태의 난수 발생
			let temp = arr[i];					// ┐
			arr[i] = arr[j];					// │자리 바꾸기
			arr[j] = temp;						// ┘
		}
		
		// 확인
		// alert(arr);		// 더미 확인
		// return arr;		// 더미 반환
		
		// 배열의 요소에 옮겨 담기
		for(let i=0; i<lottoArray.length; i++){ //i: 0 ~ 5
			lottoArray[i] = arr[i];
		}
		
		// 확인
		//return lottoArray;	// 더미 반환
		
		
		// 확인
		//let lottoArray = ["나물", "다랑어", "가지"]; 
		//lottoArray = ["ttt", "kkk", "ccc", "aaa"]; 
		
		// 정렬 수행
		lottoArray.sort(function(left, right)
		{
			// 큰 수		작은 수			양수
			// 작은 수		큰 수			음수
			// 같은 수		같은 수			0
			return Number(left) - Number(right);	// 오름차순	
			// return Number(right) - Number(left);	// 내림차순	
		});
		
		// 구성된 배열 반환
		//return lottoArray;		// 더미 반환
		
		let result = "";
		for(let i = 0; i<lottoArray.length; i++)
			result += lottoArray[i]+" ";
		
		// 구성된 문자열 반환
		return result;
		
	}

		< 주문하기>				→ button

		1 2 5 6 8 10
		3 13 22 23 31 34
		2 3 12 34 42 44
		-----------------------
						
		----------------------------------------------------		
	 -->
	 
	 <div>
	 	<form>
	 		<label for="txtCount">로또</label>
	 		<input type="text" id="txtCount" /> 장
	 		<br>
	 		<input type="button" value="주문하기" class="btn" onclick="actionLotto()" />
