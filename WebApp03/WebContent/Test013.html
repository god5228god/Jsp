<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test013.html</title>
<style type="text/css">
.calc{width: 300px; height: 350px; background-color: #b0ceff; }
form{width: 200px; height: 350px; margin: 0 auto; padding-top: 20px; box-sizing: border-box;}
input{width: 80px; height: 20px; margin-bottom: 10px;}
label{display:inline-block; width:100px; padding-left: 5px;}
.result{margin-top: 20px;}
.btn{display: inline-block; width: 100px; height: 30px; text-align:center; border: none;
	background-color: #fff; font-weight: bold; color: #333; border-radius: 5px; box-shadow: 2px 2px 2px #9ebdf0; margin-left: 50px; margin-bottom: 10px;}
.btn:hover{background-color: #6d8cbd; color: #fff;} 

</style>
<script type="text/javascript">

	function calc(){
		var kor = parseInt(document.getElementById("kor").value);
		var eng = parseInt(document.getElementById("eng").value);
		var mat = parseInt(document.getElementById("mat").value);

		var avg = (kor+eng+mat)/3;
		
		document.getElementById("avg").value = Math.round(avg);
		
		var pan;
		if((kor>=40 && eng>=40 && mat>=40) && avg>=60){
			pan = '합격';
		}else if(avg>=60){
			pan ="과락";
		}else if(avg<60){
			pan="불합격";
		}
		
		document.getElementById("pan").value = pan;
	}
		

</script>

</head>
<body>
	<div>
		<h1>자바스크립트 활용</h1>
		<hr />
	</div>
	
	<!--
		사용자로부터 이름, 국어점수, 영어점수, 수학점수를 입력받아
		평균점수와 판정결과를 출력하는 페이지를 구현한다.
		판정결과는 합격, 과락, 불합격 중 하나로 처리한다.
		
		합격은 모든 과목 점수가 40점 이상이면서 평균점수가 60점 이상인 경우,
		과락은 평균 점수가 60점 이상이지만 한 과목이라고 과목 점수가 40점 미만의 과목이 존재하는 경우,
		불합격은 평균 점수가 60점 미만인 경우로 처리한다.
		
		HTML, CSS, JS활용
		
		페이지 레이아웃
		-----------------------------------------------------------------
		
		이름 	[	  	]	#name
		국어점수[		]	#kor
		영어점수[		]	#eng
		수학점수[		]	#mat
		
		
		<처리 결과 확인>
		평균	판정결과
		[	]	[		]
		#avg 		#pan		
		-----------------------------------------------------------------
	  -->
	  
	  <div class="calc">
	  	<form>
	  		<label for="name">이름</label>
	  		<input type="text" id="name"/>
	  		<br>
	  		<label for="kor">국어점수</label>
	  		<input type="text" id="kor"/>
	  		<br>
	  		<label for="eng">영어점수</label>
	  		<input type="text" id="eng"/>
	  		<br>
	  		<label for="mat">수학점수</label>
	  		<input type="text" id="mat"/>
	  		<br>
	  		
	  		<div class="result">
	  			
	  			<input type="button" class="btn" value="처리 결과 확인" onclick="calc()" />
	  			<br>
	  			<label for="avg">평균</label>
	  			<input type="text" id="avg" disabled="disabled" />
	  			<br>
	  			<label for="pan">판정결과</label>
	  			<input type="text" id="pan"  disabled="disabled"/>
	  		</div>
	  	</form>
	  
	  </div>
	  
	  
</body>
</html>
