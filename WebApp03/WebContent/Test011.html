<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test011.html</title>
<style type="text/css">

form{padding: 20px; width: 350px; background-color: #f0f0f0;}
.txtNum{display: block; width: 80px; height: 20px; margin-bottom:  10px; text-align:  right; }
.txtNum:last{margin-bottom: 0;}

.btn{width: 80px; height: 35px; border:none; margin-top: 0;
	background-color: #ccc; font-weight: bold; color: #333;}
.btn:hover{background-color: coral; color: white;}
.btn2:hover{background-color: #f0c1bd;}

</style>
<script type="text/javascript">

function plus(){
	
	var num1 = document.getElementById("num1").value;
	var num2 = document.getElementById("num2").value;
	
	var result = Number(num1) + Number(num2);
	
	document.getElementById("result").value = result;
	
	
}
function minus(){
	
	var num1 = document.getElementById("num1").value;
	var num2 = document.getElementById("num2").value;
	
	var result = Number(num1) - Number(num2);
	
	document.getElementById("result").value = result;
}

function multiply(){
	
 	var num1 = document.getElementById("num1").value;
	var num2 = document.getElementById("num2").value;
	
	var result = Number(num1) * Number(num2);
	
	document.getElementById("result").value = result; 
}

function divide(){
	
	var num1 = document.getElementById("num1").value;
	var num2 = document.getElementById("num2").value;
	
	var result = Number(num1) / Number(num2);
	
	document.getElementById("result").value = result;
}

function calc(obj)
{
//	alert(obj.type);
	//alert(obj.value);
	
	var num1 = Number(document.getElementById("num1").value);
	var num2 = Number(document.getElementById("num2").value);
	
	if(obj.value=='더하기'){
		var result =num1 + num2;
	}else if(obj.value=='빼기'){
		var result =num1 - num2;
	}else if(obj.value=='곱하기'){
		var result =num1 * num2;
	}else if(obj.value=='나누기'){
		var result =num1 / num2;
	}
	document.getElementById("result").value = result;
}

</script>
</head>
<body>
<div>
	<h1>자바스크립트 활용</h1>
	<hr />
</div>

<div>
	<p>사용자로부터 두 개의 정수를 입력받고</p>
	<p>합, 차, 곱, 몫을 연산하여 연산 결과를 페이지에 출력할 수 있도록 한다.</p>
	<p>HTML, CSS, Javascript를 활용하여 처리한다.</p>
</div>

<div>
	<form>
		정수1 <input type="text" id="num1" class="txtNum" />
		정수2 <input type="text" id="num2" class="txtNum" />
		<br><br>
		
	<!-- 	<input type="button" class="btn" value="더하기" onclick="plus()" />
		<input type="button" class="btn" value="빼기" onclick="minus()" />
		<input type="button" class="btn" value="곱하기" onclick="multiply()" />
		<input type="button" class="btn" value="나누기" onclick="divide()" /> -->
		
		<input type="button" class="btn" value="더하기" onclick="calc(this)" />
		<input type="button" class="btn" value="빼기" onclick="calc(this)" />
		<input type="button" class="btn" value="곱하기" onclick="calc(this)" />
		<input type="button" class="btn" value="나누기" onclick="calc(this)" />
		<br><br>
		
		결과 <input type="text" id="result" class="txtNum" disabled="disabled"/>
		<input type="reset" class="btn btn2" value="취소" />
		
	</form>
</div>
</body>
</html>
