<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test015.html</title>
<style type="text/css">
form{width: 300px; }
input[type="text"]{width: 150px; height: 25px; text-align: center; font-size: 16px;}
.btn{width: 260px; height: 35px; margin: 10px 0; border: none; background-color:#6dbd85; font-weight: bold; color: #fff; font-size: 16px}
</style>
<script type="text/javascript">

var arr1 = [4, 7, 9, 1, 3, 2, 5, 6, 8];

function init(){
	document.getElementById("arr1").value = arr1;
}

function print(){
	document.getElementById("arr2").value ="";
	
	var arr2 = "";
	for(var i = 0 ; i<arr1.length; i++){
		if (arr1[i]%2==0){
			arr2 += arr1[i] +" ";
		}
	}
	document.getElementById("arr2").value = arr2 ;
}
</script>
</head>
<body onload="init()">
<div>
	<h1>자바스크립트 활용</h1>
	<hr />
</div>

<!-- 
	지정된 요소가 정수로 구성된 1차원 배열을 만들고
	이 배열의 숫자 데이터들 중 짝수만 골라 출력하는 페이지를 구현한다.
	
	HTML, CSS, JS를 활용한다.
	또한, 자바스크립트 배열을 활용한다.
	
	※ 지정된 요소의 배열 → 4 7 9 1 3 2 5 6 8
	
	페이지 레이아웃
	---------------------------------------------------
	
	초기 배열 상태 [4 7 9 1 3 2 5 6 8] 		→ 지정된 배열 #arr1
	
	< 결과 >								→ button
	
	짝수만 출력 [		]					→ text  	  #arr2
	
	
	---------------------------------------------------
	
 -->
 
 <div>
 	<form>
 		<label for="arr1">초기 배열 상태</label>
 		<input type="text" disabled="disabled"  id="arr1"/>
 		<br>
 		<input type="button" value="결과" onclick="print()" class="btn" />
 		<br>
 		<label for="arr2">짝수만 출력</label>
 		<input type="text" id="arr2" disabled="disabled" />
 	</form>
 </div>
 
</body>
</html>
