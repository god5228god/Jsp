 {

 }

<script type="text/javascript">
	function actionPerformed()
	{
		//alert("함수 호출 확인~!!!");
		//console.log;
		var vKor = document.getElementById("kor").value;
		//alert(vkor);
		var vEng = document.getElementById("eng").value;
		var vMat = document.getElementById("mat").value;
		
		//var vTot = vKor + vEng + vMat;
		//alert(vTot);
		//--==>> "908070"
		// parseInt()
		//var vTot = parseInt(vKor + vEng + vMat);
		//alert(vTot);
		//--==>> 908070
		var vTot = parseInt(vKor)+ parseInt(vEng) + parseInt(vMat);
		//alert(vTot);
		//--==>> 240
		
		//var vAvg = vTot/3;
		//alert(vAvg);
		//--==>> 80.33333333333333

		//alert(vAvg);

		document.getElementById("tot").value = vTot;
		document.getElementById("avg").value = vAvg;
		
		
		
	}
	
</script>

</head>

	<h1>데이터 입력 관련 태그</h1>
	<h2>입력 양식 태그</h2>
</div>

<div>
	<!-- check~!!! -->
	<form>

		<br>

		<!-- 『actionPerfomed()』 자바스크립트 함수 호출  -->
		<input type="button" value="결과" onclick="actionPerformed()">
		<input type="reset" value="취소">
		<br><br/>
		
		총점 <input type="text" id="tot"> 평균 <input type="text" id ="avg">
	</form>
</div>
