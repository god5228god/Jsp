		let daysName = ["일","월","화","수","목","금","토"];

	function createTdNode(val){							//--"강명철"
		let textNode = document.createTextNode(val);	//-- └ "강명철"
		let tdNode = document.createElement("td");		//--<td></td>
		tdNode.appendChild(textNode);
		
		return tdNode;
	}
