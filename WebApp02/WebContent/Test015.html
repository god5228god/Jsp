<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test015.html</title>
<style type="text/css">
	#box
	{
		/* display: none; */
		/* display: block; */
		/* display: inline; */
		display: inline-block;
		
		background-color:  red;
		width: 100px;
		height: 50px;
		margin: 10px;
	}
</style>
</head>
<body>
<div>
	<h1>CSS 렌더링속성</h1>
	<hr />
</div>

<!-- 
※ 랜더링 속성은 브라우저가 화면에 그려내는 방식을 의미하며
	대표적으로 display 속성이 있다.
	→ 인라인 형식, 블록형식, 인라인-블록 형식, 그려내지 않는 형식
	   (inline) 	(block)   (inline-block) 	(none)
 -->
 
<div>
	<span>테스트 텍스트</span><span>또다른 텍스트</span>
	<div id="box">Target</div>
	<span>테스트 텍스트</span><span>또다른 텍스트</span>
</div>
 
 
 	
</body>
</html>
