<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test014.html</title>
<style type="text/css">
textarea{width: 300px; height: 200px; margin-top: 20px; }
.btn{width: 150px; height: 35px; margin-top: 20px; background-color: #6d8cbd; color: #fff; border: none;
	font-size: 18px; font-weight: bold;}
input[type="reset"]{background-color: #999;}
#num{height: 25px; width: 150px; text-align: center; font-size: 16px;}

</style>
<script type="text/javascript">


	function check(){
		
		document.getElementById("result").value="";

		var num = parseInt(document.getElementById("num").value);
			
		if(num<100){
			alert("다시 입력");
			return;
		}
		
		var result = 0;
		var print = "";
	

		for(var i = 1; i<=num ; i++){
			result += i;
			
			if(i%10==0){
				print += "1 ~ " + i + " : " + result +"\n";
			}
		}
		print += ">> 1 ~ "+ num +": "+ result;
		document.getElementById("result").value = print;
	}
	
		
	
	
</script>
</head>
<body>
<div>
	<h1>자바스크립트 활용</h1>
	<hr />
</div>
<!--
	사용자로부터 임의의 정수 n을 입력받아
	1부터 n까지의 합을 계산하되
	n은 100이상만 허용할 수 있도록 처리하고,
	출력 시 10의 배수가 될 때마다 중간 합을 출력할 수 있는 페이지를 구성한다.
	반복문을 활용해볼 수 있도록 한다.
	
	HTML, CSS, JS 활용
	
	페이지 레이아웃 
	-----------------------------------------------------------------
	
	정수 입력(100 이상)	[  101  ]	→ textbox → 조건 유효성 #num
	
		< 결과 >	< 취소 >		→ button
		
		---------------------		→ textarea 		#result
		
		1 ~ 10: xx    ┐	
		1 ~ 20: xxx   │
		1 ~ 30: xxx   │ 중간합
		   : 		  │	
		1 ~ 100: xxxx ┘
		>> 1 ~ 101: xxxx - 최종합
		---------------------
		
	
	------------------------------------------------------------------
 -->

<div class="calc">

	<form>
		<label for="num">정수 입력(100 이상)</label>
		<input type="text" id="num" />
		<br>
		<input type="button" class="btn" value="결과" onclick="check()"/>
		<input type="reset" class="btn" value="취소" />
		<br>
		<textarea id="result">
		
		</textarea>
	</form>
</div>


</body>
</html>
